<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONSEC 2026 Countdown</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: linear-gradient(145deg, #0f172a, #111827);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 28px;
      color: #ffffff;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: -80px;
      right: -80px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.30), transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #f59e0b;
      margin-bottom: 10px;
    }

    .title {
      font-size: 30px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.72);
      margin-bottom: 24px;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .time-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 18px;
      padding: 18px 12px;
      text-align: center;
      backdrop-filter: blur(6px);
    }

    .time-value {
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 6px;
    }

    .time-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.62);
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .event-date {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.82);
    }

    .status {
      font-size: 14px;
      font-weight: 600;
      color: #f59e0b;
    }

    .progress-wrap {
      margin-top: 8px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.62);
      margin-bottom: 8px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      transition: width 0.6s ease;
    }

    @media (max-width: 560px) {
      .card {
        padding: 22px;
        border-radius: 20px;
      }

      .title {
        font-size: 24px;
      }

      .time-value {
        font-size: 28px;
      }

      .countdown {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">ASC Flagship Event</div>
    <div class="title">CONSEC 2026 Countdown</div>
    <div class="subtitle">Time remaining until 29 October 2026</div>

    <div class="countdown">
      <div class="time-box">
        <div class="time-value" id="days">0</div>
        <div class="time-label">Days</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="hours">0</div>
        <div class="time-label">Hours</div>
      </div>
      <div class="time-box">
        <div class="time-value" id="minutes">0</div>
        <div class="time-label">Minutes</div>
      </div>
    </div>

    <div class="footer-row">
      <div class="event-date">Event date: 29 October 2026</div>
      <div class="status" id="status">Countdown live</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Campaign runway</span>
        <span id="progressText">0% elapsed</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>

  <script>
    const targetDate = new Date("2026-10-29T00:00:00");
    const campaignStart = new Date("2026-04-02T00:00:00");

    function updateCountdown() {
      const now = new Date();
      const totalMs = targetDate - campaignStart;
      const remainingMs = targetDate - now;
      const elapsedMs = now - campaignStart;

      const daysEl = document.getElementById("days");
      const hoursEl = document.getElementById("hours");
      const minutesEl = document.getElementById("minutes");
      const statusEl = document.getElementById("status");
      const progressFill = document.getElementById("progressFill");
      const progressText = document.getElementById("progressText");

      if (remainingMs <= 0) {
        daysEl.textContent = "0";
        hoursEl.textContent = "0";
        minutesEl.textContent = "0";
        statusEl.textContent = "CONSEC is here";
        progressFill.style.width = "100%";
        progressText.textContent = "100% elapsed";
        return;
      }

      const totalMinutes = Math.floor(remainingMs / (1000 * 60));
      const days = Math.floor(totalMinutes / (60 * 24));
      const hours = Math.floor((totalMinutes % (60 * 24)) / 60);
      const minutes = totalMinutes % 60;

      daysEl.textContent = days;
      hoursEl.textContent = hours;
      minutesEl.textContent = minutes;

      statusEl.textContent = "Countdown live";

      let progress = (elapsedMs / totalMs) * 100;
      progress = Math.max(0, Math.min(100, progress));

      progressFill.style.width = progress.toFixed(1) + "%";
      progressText.textContent = Math.round(progress) + "% elapsed";
    }

    updateCountdown();
    setInterval(updateCountdown, 60000);
  </script>
</body>
</html>
